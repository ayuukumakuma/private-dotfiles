# 互換性と非推奨設定に対応するための設定バージョン
# 省略時の既定値: config-version = 1
config-version = 2

# AeroSpace 起動後に実行するコマンドを追加できます
# 利用可能なコマンド: https://nikitabobko.github.io/AeroSpace/commands
after-startup-command = []

# ログイン時に AeroSpace を起動する
start-at-login = true

# 正規化。詳細: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# 詳細: https://nikitabobko.github.io/AeroSpace/guide#layouts
# 'accordion-padding' はアコーディオンの余白サイズを指定します
# 0 にすると余白機能を無効にできます
accordion-padding = 30

# 設定可能な値: タイル|アコーディオン
default-root-container-layout = "accordion"

# 設定可能な値: 横向き|縦向き|自動
# 'auto' の場合: 横長のモニター（高さより幅が広い）は横向きになります
#               縦長のモニター（幅より高さが高い）は縦向きになります
default-root-container-orientation = "auto"

# フォーカス中のモニターが変わると、マウスがフォーカスに追従します
# この挙動が不要なら設定から削除してください
# 詳細: https://nikitabobko.github.io/AeroSpace/guide#on-focus-changed-callbacks
# 詳細: https://nikitabobko.github.io/AeroSpace/commands#move-mouse
# 省略時の既定値: on-focused-monitor-changed = []
on-focused-monitor-changed = ["move-mouse monitor-lazy-center"]

# このフラグを切り替えると、macOS の「アプリケーションを隠す」(cmd-h) を実質的に無効化できます
# この macOS 機能を使わないのに、うっかり cmd-h や cmd-alt-h を押してしまう場合に便利です
# こちらも参照: https://nikitabobko.github.io/AeroSpace/goodies#disable-hide-app
automatically-unhide-macos-hidden-apps = true

# ウィンドウがなくても、非表示でも存続させるワークスペースの一覧
# この設定は 'config-version = 2' から利用できます
# 省略時の既定値: persistent-workspaces = []
persistent-workspaces = [
  "1",
  "2",
  "3",
  "4",
  "5",
  "6",
  "7",
  "8",
  "9",
  # "A",
  # "B",
  # "C",
  # "D",
  # "E",
  # "F",
  # "G",
  # "I",
  # "M",
  # "N",
  # "O",
  # "P",
  # "Q",
  # "R",
  # "S",
  # "T",
  # "U",
  # "V",
  # "W",
  # "X",
  # "Y",
  # "Z"
]

# バインドモードが変わるたびに実行されるコールバック
# 詳細: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# 詳細: https://nikitabobko.github.io/AeroSpace/commands#mode
on-mode-changed = []

# 設定可能な値: (qwerty|dvorak|colemak)
# 詳細: https://nikitabobko.github.io/AeroSpace/guide#key-mapping
[key-mapping]
preset = "qwerty"

# ウィンドウ間の余白（inner-*）と、モニター端の余白（outer-*）
# 設定例:
# - 固定値:     gaps.outer.top = 8
# - モニターごと: gaps.outer.top = [{ monitor.main = 16 }, { monitor."some-pattern" = 32 }, 24]
#                 この例では、24 が一致しなかった場合の既定値です
#                 モニターパターンは 'workspace-to-monitor-force-assignment' と同じです
#                 詳細:
#                 https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
[gaps]
inner.horizontal = 5
inner.vertical = 5
outer.left = 5
outer.bottom = 5
outer.top = [{ monitor."DELL*" = 38 }, 5]
outer.right = 5

# 'main' バインドモードの宣言
# 詳細: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# 'main' バインドモードは必ず存在している必要があります
# 省略時の既定値: mode.main.binding = {}
[mode.main.binding]
# 利用可能なキー:
# - 文字キー.     a, b, c, ..., z
# - 数字キー.     0, 1, 2, ..., 9
# - テンキー数字. keypad0, keypad1, keypad2, ..., keypad9
# - Fキー.        f1, f2, ..., f20
# - 特殊キー.     minus, equal, period, comma, slash, backslash, quote, semicolon,
#                backtick, leftSquareBracket, rightSquareBracket, space, enter, esc,
#                backspace, tab, pageUp, pageDown, home, end, forwardDelete,
#                sectionSign (ISO キーボードのみ、欧州キーボードのみ)
# - テンキー特殊. keypadClear, keypadDecimalMark, keypadDivide, keypadEnter, keypadEqual,
#                keypadMinus, keypadMultiply, keypadPlus
# - 矢印キー.     left, down, up, right

# 利用可能な修飾キー: cmd, alt, ctrl, shift

# 利用可能なコマンド: https://nikitabobko.github.io/AeroSpace/commands

# 詳細: https://nikitabobko.github.io/AeroSpace/commands#exec-and-forget
