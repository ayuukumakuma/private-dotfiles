#:schema https://developers.openai.com/codex/config-schema.json

model = "gpt-5.4"
model_reasoning_effort = "medium"
personality = "pragmatic"
plan_mode_reasoning_effort = "high"
suppress_unstable_features_warning = true
web_search = "live"
approval_policy = "on-request"
sandbox_mode = "danger-full-access"
allow_login_shell = true

[sandbox_workspace_write]
network_access = true

[features]
apps = true
js_repl = true
multi_agent = true
prevent_idle_sleep = true
voice_transcription = true

[mcp_servers.figma]
url = "https://mcp.figma.com/mcp"

[mcp_servers.playwright]
args = ["@playwright/mcp@latest"]
command = "npx"

[mcp_servers.vibe_kanban]
args = [
  "-y",
  "vibe-kanban@latest",
  "--mcp",
]
command = "npx"

[projects."/Users/ayuu/ghq/github.com/ayuukumakuma"]
trust_level = "trusted"

[projects."/Users/ayuu/ghq/github.com/ayuukumakuma/private-dotfiles"]
trust_level = "trusted"

[projects."/Users/ayuu/ghq/github.com/ayuukumakuma/setsuna"]
trust_level = "trusted"

[tui]
status_line = [
  "model-with-reasoning",
  "current-dir",
  "git-branch",
  "context-used",
  "five-hour-limit",
  "weekly-limit",
  "codex-version",
]
