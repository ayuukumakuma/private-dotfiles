#:schema https://developers.openai.com/codex/config-schema.json

model = "gpt-5.3-codex"
model_reasoning_effort = "xhigh"
personality = "pragmatic"
web_search = "live"
suppress_unstable_features_warning = true
plan_mode_reasoning_effort = "xhigh"

[projects."/Users/ayuu/ghq/*"]
trust_level = "trusted"

[projects."/Users/ayuu/ghq/github.com/ayuukumakuma/private-dotfiles"]
trust_level = "trusted"

[projects."/Users/ayuu/ghq/github.com/ayuukumakuma"]
trust_level = "trusted"

[projects."/Users/ayuu/ghq/github.com/ayuukumakuma/setsuna"]
trust_level = "trusted"

[tui]
status_line = [
  "model-with-reasoning",
  "current-dir",
  "git-branch",
  "context-used",
  "five-hour-limit",
  "weekly-limit",
  "codex-version",
]

[features]
multi_agent = true
prevent_idle_sleep = true
js_repl = true
apps = true
voice_transcription = true
