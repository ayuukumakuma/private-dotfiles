# ====================
# General
# ====================
set -ag terminal-overrides ",xterm-256color:RGB"
set -g allow-passthrough on
set -g update-environment "SSH_AUTH_SOCK"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set-option -g default-shell /etc/profiles/per-user/ayuu/bin/fish

# ====================
# Prefix
# ====================
unbind C-b
set -g prefix C-j
bind C-j send-prefix

# ====================
# Key Bindings
# ====================

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Pane splitting
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Window navigation
bind Tab last-window

# ====================
# Popup
# ====================
bind t display-popup -d "#{pane_current_path}" -w 80% -h 80% -E

# ====================
# Copy Mode (vi)
# ====================
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# ====================
# Plugins (TPM)
# ====================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'catppuccin/tmux'

# After adding/updating plugins, press prefix + I to install via TPM.

# Catppuccin
set -g @catppuccin_flavor "latte"
run '~/.config/tmux/plugins/tmux/catppuccin.tmux'

# Status bar
set -g status-left-length 20
set -g status-left "#{?client_prefix,#[fg=#{E:@thm_red}]#{E:@catppuccin_status_left_separator}#[fg=#{E:@thm_crust}]#[bg=#{E:@thm_red}]#[bold] PREFIX #[default],}"

set -g status-right-length 200
set -g status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_date_time}"
set -ag status-right "#{E:@catppuccin_status_session}"

# Initialize TPM (keep this line at the very bottom)
run '~/.config/tmux/plugins/tpm/tpm'
