#:schema https://developers.openai.com/codex/config-schema.json

model = "gpt-5.4"
model_reasoning_effort = "medium"
personality = "friendly"
plan_mode_reasoning_effort = "high"
suppress_unstable_features_warning = true
web_search = "live"
approval_policy = "on-request"
sandbox_mode = "danger-full-access"
allow_login_shell = true

[sandbox_workspace_write]
network_access = true

[features]
apps = true
js_repl = true
multi_agent = true
prevent_idle_sleep = true

[mcp_servers.figma]
url = "https://mcp.figma.com/mcp"

[mcp_servers.xcode]
command = "xcrun"
args = ["mcpbridge"]

[mcp_servers.xcode.tools.XcodeListWindows]
approval_mode = "approve"

[mcp_servers.xcode.tools.XcodeRead]
approval_mode = "approve"

[mcp_servers.xcode.tools.RenderPreview]
approval_mode = "approve"

[mcp_servers.xcode.tools.BuildProject]
approval_mode = "approve"

[mcp_servers.xcode.tools.RunSomeTests]
approval_mode = "approve"

[mcp_servers.xcode.tools.GetTestList]
approval_mode = "approve"

[mcp_servers.xcode.tools.XcodeRefreshCodeIssuesInFile]
approval_mode = "approve"

[mcp_servers.xcode.tools.GetBuildLog]
approval_mode = "approve"

[mcp_servers.xcode.tools.XcodeGrep]
approval_mode = "approve"

[mcp_servers.xcode.tools.XcodeListNavigatorIssues]
approval_mode = "approve"

[projects."/Users/ayuu/ghq/github.com/ayuukumakuma"]
trust_level = "trusted"

[projects."/Users/ayuu/ghq/github.com/ayuukumakuma/private-dotfiles"]
trust_level = "trusted"

[projects."/Users/ayuu/ghq/github.com/ayuukumakuma/setsuna"]
trust_level = "trusted"

[tui]
status_line = [
  "model-with-reasoning",
  "git-branch",
  "five-hour-limit",
  "weekly-limit",
  "codex-version",
  "project-root",
  "fast-mode"
]

[notice]
hide_rate_limit_model_nudge = true

[plugins."google-calendar@openai-curated"]
enabled = true

[plugins."gmail@openai-curated"]
enabled = true

[plugins."github@openai-curated"]
enabled = true

[plugins."google-drive@openai-curated"]
enabled = true

[plugins."notion@openai-curated"]
enabled = true

[plugins."build-ios-apps@openai-curated"]
enabled = true
